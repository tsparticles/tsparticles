name: Deploy Confetti

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main
    paths:
      - 'websites/confetti/**'
      - '.github/workflows/deploy-confetti.yml'
  workflow_dispatch:

concurrency:
  group: deploy-confetti-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for confetti changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            if git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -q "^websites/confetti/"; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "changed=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v6
        if: steps.changes.outputs.changed == 'true'
        with:
          cache: true

      - uses: actions/setup-node@v6
        if: steps.changes.outputs.changed == 'true'
        with:
          node-version: '24'

      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        working-directory: websites/confetti
        run: pnpm install

      - name: Build
        if: steps.changes.outputs.changed == 'true'
        working-directory: websites/confetti
        run: pnpm run build:ci

      - name: Generate GitHub App token
        if: steps.changes.outputs.changed == 'true'
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.PAGES_APP_ID }}
          private-key: ${{ secrets.PAGES_APP_PRIVATE_KEY }}
          owner: tsparticles
          repositories: |
            confetti

      - name: Deploy to tsparticles/confetti main
        if: steps.changes.outputs.changed == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          external_repository: tsparticles/confetti
          publish_branch: main
          publish_dir: websites/confetti/public
          cname: confetti.js.org
          user_name: 'github-actions-bot'
          user_email: 'support+actions@github.com'
          commit_message: 'build: website updated'
          force_orphan: true
