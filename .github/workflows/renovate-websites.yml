name: Renovate (websites)

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Renovate
        uses: renovatebot/github-action@v46.1.17
        with:
          configurationFile: renovate-websites.json
          token: ${{ secrets.RENOVATE_TOKEN }}
