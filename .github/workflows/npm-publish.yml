name: Publish Packages

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  NX_CLOUD_DISTRIBUTED_EXECUTION: true
  NX_CLOUD_ACCESS_TOKEN: "${{ secrets.NX_CLOUD_ACCESS_TOKEN }}"
  ZIP_CONCURRENCY: 5
  IS_STABLE: ${{ !contains(github.ref, '-alpha.') && !contains(github.ref, '-beta.') }}

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        name: Checkout Source
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        name: Setup Node.js
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - uses: pnpm/action-setup@v5.0.0
        name: Install pnpm
        with:
          cache: true

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "pnpm_cache_dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        name: Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.pnpm_cache_dir }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install

      - name: Initialize Nx Cloud
        run: pnpm exec nx-cloud start-ci-run --distribute-on="5 linux-medium-js"

      - name: Build All Packages
        run: pnpm run slimbuild:ci
        env:
          CI: true

      # 📦 ZIP artifacts (solo stable)
      - name: Generate zip artifacts
        if: env.IS_STABLE == 'true'
        env:
          ZIP_CONCURRENCY: ${{ env.ZIP_CONCURRENCY }}
        run: pnpm run release:zip-artifacts

      # 🚀 Publish npm
      - name: Publish to NPM (OIDC Auth)
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          BASE_CMD="pnpm exec nx release publish --skip-version"

          echo "Publishing tag: $TAG via OIDC"

          if [[ "$TAG" == *"-alpha."* ]]; then
            $BASE_CMD --tag=alpha
          elif [[ "$TAG" == *"-beta."* ]]; then
            $BASE_CMD --tag=beta
          elif [[ "$TAG" == v1* ]]; then
            $BASE_CMD --tag=v1
          elif [[ "$TAG" == v2* ]]; then
            $BASE_CMD --tag=v2
          elif [[ "$TAG" == v3* ]]; then
            $BASE_CMD --tag=v3
          else
            $BASE_CMD
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # 🧠 Create release (raw GitHub notes)
      - name: Create Release (raw)
        if: env.IS_STABLE == 'true'
        id: release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*.zip
          generate_release_notes: true

      # ✨ Prettify changelog → per package
      - name: Prettify changelog
        if: env.IS_STABLE == 'true'
        run: |
          echo "${{ steps.release.outputs.body }}" > RAW_RELEASE.md
          pnpm run release:prettify-changelog

      # 🔁 Update release con changelog finale
      - name: Update Release Notes
        if: env.IS_STABLE == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*.zip
          body_path: RELEASE_NOTES.md

      - name: Stop Nx Cloud Session
        run: pnpm nx fix-ci
        if: always()
