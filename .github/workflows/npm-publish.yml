name: Publish Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  NX_CLOUD_DISTRIBUTED_EXECUTION: true
  NX_CLOUD_ACCESS_TOKEN: "${{ secrets.NX_CLOUD_ACCESS_TOKEN }}"
  ZIP_CONCURRENCY: 5
  RELEASE_UPLOAD_RETRIES: 6
  RELEASE_RETRY_BASE_DELAY: 10
  IS_STABLE: ${{ !contains(github.ref, '-alpha.') && !contains(github.ref, '-beta.') }}

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        name: Checkout Source
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          cache: true

      - uses: actions/setup-node@v6
        name: Setup Node.js
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Install Dependencies
        run: pnpm install

      - name: Initialize Nx Cloud
        run: pnpm exec nx-cloud start-ci-run --distribute-on="5 linux-medium-js"

      - name: Build All Packages
        run: pnpm run build:ci
        env:
          CI: true

      # 📦 ZIP artifacts (solo stable)
      - name: Generate zip artifacts
        if: env.IS_STABLE == 'true'
        env:
          ZIP_CONCURRENCY: ${{ env.ZIP_CONCURRENCY }}
        run: pnpm run release:zip-artifacts

      # 🚀 Publish npm
      - name: Publish to NPM (OIDC Auth)
        run: |
          TAG="${GITHUB_REF_NAME}"
          BASE_CMD="pnpm lerna publish from-package --ignore-scripts"

          echo "Publishing tag: $TAG via OIDC"

          if [[ "$TAG" == *"-alpha."* ]]; then
            $BASE_CMD --dist-tag alpha
          elif [[ "$TAG" == *"-beta."* ]]; then
            $BASE_CMD --dist-tag beta
          elif [[ "$TAG" == v1* ]]; then
            $BASE_CMD --dist-tag v1
          elif [[ "$TAG" == v2* ]]; then
            $BASE_CMD --dist-tag v2
          elif [[ "$TAG" == v3* ]]; then
            $BASE_CMD --dist-tag v3
          else
            $BASE_CMD
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # 🧠 Create release + upload assets with retry/backoff
      - name: Create Release (raw)
        if: env.IS_STABLE == 'true'
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          source .github/scripts/retry_gh.sh

          TAG="${GITHUB_REF_NAME}"

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            retry_gh gh release create "$TAG" --generate-notes
          fi

          for file in release-artifacts/*.zip; do
            retry_gh gh release upload "$TAG" "$file" --clobber
          done

          {
            echo "body<<EOF"
            retry_gh gh release view "$TAG" --json body -q .body
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # ✨ Prettify changelog → per package
      - name: Prettify changelog
        if: env.IS_STABLE == 'true'
        run: |
          echo "${{ steps.release.outputs.body }}" > RAW_RELEASE.md
          pnpm run release:prettify-changelog

      # 🔁 Update release con changelog finale
      - name: Update Release Notes
        if: env.IS_STABLE == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          source .github/scripts/retry_gh.sh

          TAG="${GITHUB_REF_NAME}"

          retry_gh gh release edit "$TAG" --notes-file RELEASE_NOTES.md

      - name: Stop Nx Cloud Session
        run: pnpm nx fix-ci
        if: always()
