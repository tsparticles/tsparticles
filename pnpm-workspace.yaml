linkWorkspacePackages: deep

onlyBuiltDependencies:
  - "@parcel/watcher"
  - "@swc/core"
  - "@tsparticles/engine"
  - canvas
  - core-js
  - core-js-pure
  - electron
  - esbuild
  - fsevents
  - nuxt
  - nx
  - sharp
  - unrs-resolver
