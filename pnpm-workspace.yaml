packages:
  - bundles/*
  - demo/*
  - effects/*
  - engine
  - interactions/*
  - interactions/*/*
  - wrappers/*
  - templates/*
  - palettes/*/*
  - paths/*
  - plugins/*
  - plugins/colors/*
  - plugins/easings/*
  - plugins/emittersShapes/*
  - plugins/exports/*
  - presets/*
  - shapes/*
  - updaters/*
